<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | StockPro Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #06b6d4;      /* Cyan */
      --secondary: #3b82f6;    /* Blue */
      --bg-dark: #0f172a;      /* Slate 900 */
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-white: #f1f5f9;
      --text-dim: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-size: 14px;
    }

    /* Particle Background Layer */
    #canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      opacity: 0.4;
    }

    /* Dynamic Gradient Layer */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
      z-index: -1;
      animation: pulseBg 10s ease-in-out infinite alternate;
    }
    @keyframes pulseBg { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.6; transform: scale(1.2); } }

    .blob {
      position: absolute;
      width: 400px; height: 400px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      filter: blur(120px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.12;
      animation: float 25s infinite alternate;
    }
    .blob-1 { top: -150px; right: -150px; }
    .blob-2 { bottom: -150px; left: -150px; animation-delay: -7s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 60px) scale(1.1); }
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand { margin-bottom: 30px; }
    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 30px; margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
    }

    .brand-name { font-size: 26px; font-weight: 900; letter-spacing: -1px; font-family: 'Outfit', sans-serif; color: white; }
    .brand-tag { font-size: 13px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

    .form-group { text-align: right; margin-bottom: 20px; }
    .label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }
    
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; right: 14px; font-size: 16px; color: var(--text-dim); z-index: 5; }

    .password-toggle {
      position: absolute; left: 14px; background: none; border: none;
      color: var(--text-dim); cursor: pointer; font-size: 16px; z-index: 5;
    }

    .input-field {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1.5px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 40px 12px 40px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
      box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.4);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(6, 182, 212, 0.5); }

    .error-alert {
      background: rgba(244, 63, 94, 0.1);
      color: #fca5a5;
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .extra-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 12px; }
    .extra-links a { color: var(--text-dim); text-decoration: none; transition: 0.2s; cursor: pointer; }
    .extra-links a:hover { color: var(--primary); }

    .loader {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .info-popup {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: var(--primary); color: white; padding: 10px 20px;
        border-radius: 50px; font-size: 13px; font-weight: 600;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        transition: 0.4s; z-index: 2000; opacity: 0;
    }
    .info-popup.active { transform: translateX(-50%) translateY(0); opacity: 1; }

  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div class="bg-gradient"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div id="infoPopup" class="info-popup"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">📦</div>
      <div class="brand-name">STOCK PRO</div>
      <div class="brand-tag">نظام إدارة المخازن والمستودعات الذكية</div>
    </div>

    <div id="errorBox" class="error-alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="label">البريد الإلكتروني</label>
        <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="label">كلمة المرور</label>
        <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            <button type="button" class="password-toggle" id="togglePassword">👁️</button>
        </div>
      </div>
      
      <button type="submit" class="btn-login" id="submitBtn">
        <span id="btnText">دخول للنظام</span>
        <div id="btnLoader" class="loader"></div>
      </button>
    </form>

    <div class="extra-links">
        <a onclick="showInfo('يرجى التواصل مع مدير النظام لإعادة تعيين كلمة المرور')">نسيت كلمة المرور؟</a>
        <a onclick="showInfo('جاري تحويلك للدعم الفني...')">طلب دعم فني</a>
    </div>
  </div>

  <script>
    // Professional Constellation Animation
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null, radius: 150 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
    });

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        let numParticles = (canvas.width * canvas.height) / 9000;
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;

            // Mouse interaction
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
                const forceDirectionX = dx / distance;
                const forceDirectionY = dy / distance;
                const force = (mouse.radius - distance) / mouse.radius;
                this.x -= forceDirectionX * force * 2;
                this.y -= forceDirectionY * force * 2;
            }
        }
        draw() {
            ctx.fillStyle = 'rgba(6, 182, 212, 0.8)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particles.length; a++) {
            for (let b = a; b < particles.length; b++) {
                let dx = particles[a].x - particles[b].x;
                let dy = particles[a].y - particles[b].y;
                let distance = dx * dx + dy * dy;
                if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                    opacityValue = 1 - (distance / 20000);
                    ctx.strokeStyle = 'rgba(6, 182, 212,' + opacityValue + ')';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connect();
        requestAnimationFrame(animate);
    }

    initCanvas();
    animate();
    window.addEventListener('resize', initCanvas);
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

    // Login Logic
    const loginForm = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const infoPopup = document.getElementById('infoPopup');

    function showInfo(msg) {
        infoPopup.textContent = msg;
        infoPopup.classList.add('active');
        setTimeout(() => infoPopup.classList.remove('active'), 3000);
    }

    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.textContent = type === 'password' ? '👁️' : '🔒';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = passwordInput.value;

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnLoader.style.display = 'block';
      errorBox.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem('stockpro_user', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          errorBox.textContent = data.message;
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'حدث خطأ في الاتصال بالسيرفر';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'block';
        btnLoader.style.display = 'none';
      }
    });

    if(localStorage.getItem('stockpro_user')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
